ogo.png","name":"Brainscan","url":"https://brainscan.uwo.ca"},{"img":"/img/western_logo.png","name":"Western University","url":"https://www.uwo.ca"},{"img":"/img/conp-pcno-logo.png","name":"CONP-PCNO","url":"https://conp.ca"}],"schedule":{"show":false,"startTime":8,"endTime":17,"days":[{"day":1,"month":12,"year":2021,"events":[{"name":"Breakfast","time":"8:00","duration":"1:00","room":"WIRB 4190"},{"name":"Welcome \u0026 Project Pitches","time":"9:00","duration":"1:30","room":["WIRB 1170","Zoom Room 1"]},{"name":"Hacking","time":"10:30","duration":"1:30","color":"red","room":"WIRB 1130"},{"name":"Lunch","time":"12:00","duration":"1:30","room":"WIRB 4190"},{"name":"MRI Data in Python","time":"13:30","duration":"1:00","color":"#1f331e","link":"#python","priority":1,"room":["WIRB 1110","Zoom Room 1"]},{"name":"Intro to Datalad","time":"14:30","duration":"1:30","color":"#1f331e","link":"#datalad","priority":1,"room":["WIRB 1160","Zoom Room 2"]},{"name":"Hacking","time":"13:30","duration":"2:30","color":"red","room":"WIRB 4190"}]},{"day":2,"month":12,"year":2021,"events":[{"name":"Breakfast","time":"8:00","duration":"1:00","room":"WIRB 4190"},{"name":"fMRI/fMRIPrep","time":"9:00","duration":"1:30","color":"#1f331e","link":"#frmi","priority":1,"room":["WIRB 1170","Zoom Room 1"]},{"name":"Introduction to Meta-analyses","time":"10:30","duration":"1:30","color":"#1f331e","link":"#meta-analysis","priority":1,"room":["WIRB 4190","Zoom Room 2"]},{"name":"Lunch","time":"12:00","duration":"1:30","room":"WIRB 4190"},{"name":"Intro to fNIRS","time":"13:30","duration":"2:30","color":"#1f331e","link":"#fnirs","priority":1,"room":["WIRB 1110","Zoom Room 1"]},{"name":"Hacking","time":"13:30","duration":"2:30","color":"red","room":["NSC 1 (9:00-12:00)","WIRB 1160 (10:30-12:00)"]},{"name":"Hacking","time":"9:00","duration":"3:00","color":"red","room":["WIRB 4190 (1:30-2:30)","VAC 100 (1:30-4:00)"]},{"name":"Diversity in Academia","time":"12:30","duration":"0:45","color":"blue","link":"https://github.com/BrainhackWestern/BrainhackWestern.github.io/wiki/Lunch-and-Learn#winrepo"}]},{"day":3,"month":12,"year":2021,"events":[{"name":"Breakfast","time":"8:00","duration":"1:00","room":"WIRB 4190"},{"name":"Intro to Machine Learning","time":"9:00","duration":"1:30","color":"#1f331e","link":"#machine-learning","priority":1,"room":["WIRB 1130","Zoom Room 1"]},{"name":"Intro to Deep Learning","time":"10:30","duration":"1:30","color":"#1f331e","link":"#deep-learning","priority":1,"room":["WIRB 1130","Zoom Room 2"]},{"name":"Lunch","time":"12:00","duration":"1:30","room":"WIRB 4190"},{"name":"Hacking","time":"9:00","duration":"3:00","color":"red","room":["WIRB 4190 (9:30-12:00)","VAC 100 (9:00-12:00)"]},{"name":"Hacking","time":"13:30","duration":"1:00","color":"red","room":["WIRB 4190 (1:30-2:00)","VAC 100 (1:30-2:30)"]},{"name":"Project presentations \u0026 Wrap-up","time":"14:30","duration":"1:30","room":["VAC 100","Zoom Room 1"]}]}]},"tutorials":[{"day":1,"month":12,"year":2021,"tutorialTimes":[{"name":"Afternoon","options":[{"id":"python","name":"Working with MRI Data in Python","image":"/img/python.png","description":"This tutorial will teach one to manipulate and transform neuroimaging data\nusing Python with commonly used. First, an understanding of how MRI data\nis represented in Python will be discussed followed by hands-on tasks such\nas basic manipulation of neuroimaging MRI data. All content will be\nperformed using Jupyter notebooks in the spirit of reproducible and open\nscience!\n"},{"id":"datalad","name":"Introduction to Datalad","image":"/img/datalad.png","description":"DataLad, “a free and open-source data management system for everyone,” is a\npowerful tool for obtaining data, managing your own research data, and\nexposing your data to others. This tutorial will start by introducing the\nbasics of DataLad, then we’ll use it to download some open data that may be\nuseful for a Brainhack project. We’ll process that data and use DataLad to\nkeep track of the resulting derivatives, and show how to make that data available\nto collaborators.\n"}]}]},{"day":2,"month":12,"year":2021,"tutorialTimes":[{"name":"Morning","options":[{"id":"frmi","name":"Introduction to fMRI and fMRIPrep","image":"/img/fmri.png","description":"This tutorial will start with an overview of fMRI, including the\nunderlying contrast mechanism, scanning, task design, standard\npreprocessing steps, basic processing, and results interpretation.\nThe overview will shift to cover the BIDS app, fMRIPrep. Various\nways to run fMRIPrep will be shown, however, due to time constraints,\nfMRIPrep will not be run in real time. Time will be spent discussing\nthe output of fMRIPrep, including going through a real output report.\n"},{"id":"meta-analysis","name":"Introduction to Meta-analyses for Neuroimaging Data","image":"/img/review.png","description":"Meta-analyses of neuroimaging data are a good way to get started with\nunderstanding neuroimaging and task-based neural processing. This tutorial\nwill cover the various aspects of designing a meta-analysis and some of the more\npopular methods, including both topic- and contrast-based meta-analyses and\ncoordinate- and image-based meta-analyses. Some hands-on work with the\npython-based tool NiMARE with a sample dataset will be included to help\nattendees appreciate some of the nuances between the various types of\nmeta-analyses.\n"}]},{"name":"Afternoon","options":[{"id":"fnirs","name":"Introduction to fNIRS","image":"/img/fnirs.png","description":"In this session, you will get an overview of fNIRS (functional\nnear-infrared spectroscopy). fNIRS is a relatively new neuroimaging method,\nthat has gained in popularity over the last 20 years. fNIRS uses an array\nof light sensors on the surface of the scalp to detected oxygenated and\ndeoxygenated bloodflow in cortex. fNIRS is low-cost, minimally invasive,\noffers reasonable spatial and temporal resolution, and is easily combined\nwith other neuroimaging methods. In this session, we’ll discuss fNRIS\nmethodology and applications, as well as the current state of affairs for\nfNIRS analysis. There will be a live-demonstration of the fNIRS system,\nas well as some hands-on experience with analyzing fNRIS data using\nthe Matlab-based toolbox, Homer.\n"}]}]},{"day":3,"month":12,"year":2021,"tutorialTimes":[{"name":"Morning","options":[{"id":"machine-learning","name":"Introduction to Machine Learning","image":"/img/machine-learning.png","description":"This tutorial will define the basic concepts of machine learning followed\nby an introduction to the general blocks of a machine learning pipeline using\nan example neural dataset.\n"},{"id":"deep-learning","name":"Introduction to Deep Learning","image":"/img/deep-learn.png","description":"This tutorial will start with a brief introduction and then focus on\nhands-on experience with Tensorflow. Topics will include\n  1) Organization of code into classes, functions, and the Tensorgraph,\n  2) Examples of dense and convolutional networks for real problems using\n     high-level Tensorflow tools such as built-in Keras functions,\n  3) An open session for exploring and adapting existing NNs or for\n     helping attendees build their own networks.\n"}]}]}]}},"__N_SSG":true},"page":"/FAQ","query":{},"buildId":"iV8mJRWRqC48dNguBDclT","assetPrefix":"/brainhack_western_test_site","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
